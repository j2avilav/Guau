name: guaugo_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

#Dependencias
dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.2.5
  cupertino_icons: ^1.0.8
  firebase_core: ^2.30.0
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.20.0
  google_sign_in: ^5.4.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.8
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

#Assets

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_guaugo.png
    - assets/images/icon_guaugo.png

#Íconos

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon_guaugo.png"
  min_sdk_android: 21

#Splash nativo

flutter_native_splash:
  color: "#7B2CBF"
  image: assets/images/logo_guaugo.png
  android: true
  ios: true

  android_12:
    color: "#7B2CBF"
    image: assets/images/logo_guaugo.png